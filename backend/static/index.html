<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BikAir — trasy z uwzględnieniem jakości powietrza</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<style>
  :root{
    --ink:#15241b; --ink-mute:#6b7c72; --paper:#f4f7f2; --line:#e2e8df;
    --lime:#8FD14F; --lime-deep:#4CA21E; --blue:#5B8DEF;
    --aqi-good:#8FD14F; --aqi-mod:#F5C24C; --aqi-bad:#F08A3E; --aqi-vbad:#E85555;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:system-ui,-apple-system,Segoe UI,Roboto,sans-serif;color:var(--ink);height:100vh;display:flex;overflow:hidden}
  #sidebar{width:360px;min-width:360px;height:100%;background:var(--paper);border-right:1px solid var(--line);display:flex;flex-direction:column;overflow-y:auto}
  #map{flex:1;height:100%}
  .brand{padding:18px 20px 14px;border-bottom:1px solid var(--line);display:flex;align-items:center;gap:10px}
  .brand .logo{font-weight:800;font-size:22px;letter-spacing:-.02em}
  .brand .logo .a{color:var(--lime-deep)}
  .brand .tag{font-size:11px;color:var(--ink-mute);margin-top:2px}
  .section{padding:16px 20px;border-bottom:1px solid var(--line)}
  label.fld{display:block;font-size:11px;text-transform:uppercase;letter-spacing:.05em;color:var(--ink-mute);font-weight:600;margin-bottom:5px}
  .row{display:flex;gap:8px;align-items:center;margin-bottom:12px}
  input,select{width:100%;padding:9px 11px;border:1px solid var(--line);border-radius:9px;font-size:13px;background:#fff;color:var(--ink)}
  input:focus,select:focus{outline:none;border-color:var(--lime-deep)}
  .dot-a,.dot-b{width:14px;height:14px;border-radius:50%;flex-shrink:0}
  .dot-a{background:var(--lime-deep)} .dot-b{background:var(--ink)}
  button{cursor:pointer;border:none;border-radius:9px;font-size:13px;font-weight:600;padding:10px 14px}
  .btn-primary{background:var(--lime-deep);color:#fff;width:100%}
  .btn-primary:hover{background:#3d8718}
  .btn-ghost{background:#fff;border:1px solid var(--line);color:var(--ink-mute)}
  .hint{font-size:11px;color:var(--ink-mute);line-height:1.5;margin-top:2px}
  .status{font-size:12px;padding:8px 12px;border-radius:8px;margin-top:10px;display:none}
  .status.show{display:block}
  .status.err{background:#fdecec;color:#c0392b}
  .status.info{background:#eef6e6;color:var(--lime-deep)}
  .route-card{background:#fff;border:1px solid var(--line);border-radius:12px;padding:13px;margin-bottom:10px;position:relative}
  .route-card.rec{border-color:var(--lime-deep);box-shadow:0 0 0 1px var(--lime-deep)}
  .route-card .swatch{width:26px;height:5px;border-radius:3px;display:inline-block;vertical-align:middle;margin-right:7px}
  .route-card h3{font-size:14px;display:flex;align-items:center}
  .route-card .badge{font-size:9px;background:var(--lime-deep);color:#fff;padding:2px 7px;border-radius:20px;margin-left:auto;text-transform:uppercase;letter-spacing:.04em}
  .stats{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-top:11px}
  .stat .k{font-size:9px;color:var(--ink-mute);text-transform:uppercase;letter-spacing:.04em}
  .stat .v{font-size:16px;font-weight:700;letter-spacing:-.01em}
  .stat .v small{font-size:10px;color:var(--ink-mute);font-weight:500}
  .legend{font-size:11px}
  .legend .lr{display:flex;align-items:center;gap:7px;margin-top:5px}
  .legend .ld{width:11px;height:11px;border-radius:50%}
  .muted{color:var(--ink-mute);font-size:12px;line-height:1.5}
  .spin{display:inline-block;width:13px;height:13px;border:2px solid #fff;border-top-color:transparent;border-radius:50%;animation:s .7s linear infinite;vertical-align:middle;margin-right:6px}
  @keyframes s{to{transform:rotate(360deg)}}
  .marker-pin{width:24px;height:24px;border-radius:50% 50% 50% 0;transform:rotate(-45deg);border:2px solid #fff;box-shadow:0 1px 4px rgba(0,0,0,.4)}
  .marker-pin span{transform:rotate(45deg);display:block;text-align:center;line-height:20px;color:#fff;font-weight:700;font-size:11px}
</style>
</head>
<body>
  <aside id="sidebar">
    <div class="brand">
      <div>
        <div class="logo">Bik<span class="a">Air</span></div>
        <div class="tag">Trasy rowerowe wg jakości powietrza</div>
      </div>
    </div>

    <div class="section">
      <label class="fld">Obszar</label>
      <select id="area"></select>
    </div>

    <div class="section">
      <label class="fld">Punkt startu (A)</label>
      <div class="row">
        <span class="dot-a"></span>
        <input id="startInput" placeholder="adres lub kliknij mapę">
      </div>
      <label class="fld">Cel (B)</label>
      <div class="row">
        <span class="dot-b"></span>
        <input id="endInput" placeholder="adres lub kliknij mapę">
      </div>
      <button class="btn-primary" id="routeBtn">Wyznacz trasę</button>
      <button class="btn-ghost" id="resetBtn" style="width:100%;margin-top:8px">Wyczyść</button>
      <p class="hint">Wskazówka: kliknij na mapie raz, by ustawić start, drugi raz — cel. Trasa wyznaczy się automatycznie.</p>
      <div class="status" id="status"></div>
    </div>

    <div class="section" id="results">
      <p class="muted">Wyznacz trasę, aby zobaczyć warianty i statystyki.</p>
    </div>

    <div class="section">
      <label class="fld">Jakość powietrza (AQI)</label>
      <div id="aqiInfo" class="muted">Ładowanie czujników…</div>
      <div class="legend" style="margin-top:8px">
        <div class="lr"><span class="ld" style="background:var(--aqi-good)"></span>Dobre 0–50</div>
        <div class="lr"><span class="ld" style="background:var(--aqi-mod)"></span>Umiarkowane 51–100</div>
        <div class="lr"><span class="ld" style="background:var(--aqi-bad)"></span>Niezdrowe 101–150</div>
        <div class="lr"><span class="ld" style="background:var(--aqi-vbad)"></span>Szkodliwe 151+</div>
      </div>
    </div>
  </aside>
  <div id="map"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
const API = "";                       // ten sam origin co backend
let map, areas = {}, currentArea = "warsaw";
let startLL = null, endLL = null;
let startMarker = null, endMarker = null;
let routeGroup = null, sensorGroup = null;

function aqiColor(aqi){
  if(aqi == null) return "#9aa6a0";
  if(aqi <= 50) return getCSS("--aqi-good");
  if(aqi <= 100) return getCSS("--aqi-mod");
  if(aqi <= 150) return getCSS("--aqi-bad");
  return getCSS("--aqi-vbad");
}
function getCSS(v){return getComputedStyle(document.documentElement).getPropertyValue(v).trim();}

function setStatus(msg, type){
  const el = document.getElementById("status");
  if(!msg){el.className="status";el.innerHTML="";return;}
  el.className = "status show " + (type||"info");
  el.innerHTML = msg;
}

function pinIcon(letter, color){
  return L.divIcon({className:"", html:`<div class="marker-pin" style="background:${color}"><span>${letter}</span></div>`,
    iconSize:[24,24], iconAnchor:[12,24]});
}

function setStart(latlng){
  startLL = latlng;
  if(startMarker) map.removeLayer(startMarker);
  startMarker = L.marker(latlng, {icon: pinIcon("A", getCSS("--lime-deep")), draggable:true}).addTo(map);
  startMarker.on("dragend", e=>{startLL=e.target.getLatLng(); document.getElementById("startInput").value=fmt(startLL);});
  document.getElementById("startInput").value = fmt(latlng);
}
function setEnd(latlng){
  endLL = latlng;
  if(endMarker) map.removeLayer(endMarker);
  endMarker = L.marker(latlng, {icon: pinIcon("B", getCSS("--ink")), draggable:true}).addTo(map);
  endMarker.on("dragend", e=>{endLL=e.target.getLatLng(); document.getElementById("endInput").value=fmt(endLL);});
  document.getElementById("endInput").value = fmt(latlng);
}
function fmt(ll){return ll.lat.toFixed(5)+", "+ll.lng.toFixed(5);}

async function init(){
  // mapa
  map = L.map("map").setView([52.2297,21.0122], 12);
  L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png",
    {maxZoom:19, attribution:"© OpenStreetMap"}).addTo(map);
  routeGroup = L.layerGroup().addTo(map);
  sensorGroup = L.layerGroup().addTo(map);

  map.on("click", e=>{
    if(!startLL || (startLL && endLL)){      // brak startu lub komplet → zacznij od nowa
      if(endMarker){map.removeLayer(endMarker);endMarker=null;endLL=null;document.getElementById("endInput").value="";}
      setStart(e.latlng);
    } else {
      setEnd(e.latlng);
      doRoute();
    }
  });

  // obszary z backendu
  try{
    const r = await fetch(API+"/api/areas").then(r=>r.json());
    const sel = document.getElementById("area");
    r.areas.forEach(a=>{
      areas[a.key]=a;
      const o=document.createElement("option");o.value=a.key;o.textContent=a.name;sel.appendChild(o);
    });
    sel.value = currentArea;
    sel.onchange = ()=>{currentArea=sel.value; const c=areas[currentArea].center; map.setView([c.lat,c.lng],12); loadSensors();};
  }catch(e){ setStatus("Nie mogę połączyć się z backendem.","err"); }

  document.getElementById("routeBtn").onclick = onRouteClick;
  document.getElementById("resetBtn").onclick = resetAll;
  loadSensors();
}

function resetAll(){
  [startMarker,endMarker].forEach(m=>m&&map.removeLayer(m));
  startMarker=endMarker=startLL=endLL=null;
  routeGroup.clearLayers();
  document.getElementById("startInput").value="";
  document.getElementById("endInput").value="";
  document.getElementById("results").innerHTML='<p class="muted">Wyznacz trasę, aby zobaczyć warianty i statystyki.</p>';
  setStatus(null);
}

async function geocode(q){
  const r = await fetch(API+"/api/geocode?q="+encodeURIComponent(q)).then(r=>r.json());
  if(r.results && r.results.length) return r.results[0];
  return null;
}

async function onRouteClick(){
  // jeśli pola mają adresy a nie ma markerów → geokoduj
  const si=document.getElementById("startInput").value.trim();
  const ei=document.getElementById("endInput").value.trim();
  if(!startLL && si){ setStatus("Szukam adresu startu…"); const g=await geocode(si); if(g) setStart(L.latLng(g.lat,g.lng)); }
  if(!endLL && ei){ setStatus("Szukam adresu celu…"); const g=await geocode(ei); if(g) setEnd(L.latLng(g.lat,g.lng)); }
  doRoute();
}

async function doRoute(){
  if(!startLL || !endLL){ setStatus("Ustaw punkt startu (A) i cel (B).","err"); return; }
  setStatus('<span class="spin"></span>Liczę trasę…');
  routeGroup.clearLayers();
  try{
    const res = await fetch(API+"/api/route", {
      method:"POST", headers:{"Content-Type":"application/json"},
      body: JSON.stringify({
        start:[startLL.lat, startLL.lng], end:[endLL.lat, endLL.lng],
        profiles:["clean_air","shortest"], area: currentArea
      })
    });
    const data = await res.json();
    if(!res.ok){ setStatus(data.error || "Błąd wyznaczania trasy.","err"); return; }
    drawRoutes(data);
  }catch(e){ setStatus("Błąd połączenia z backendem.","err"); }
}

const ROUTE_STYLE = {
  clean_air:{color:getCSS("--lime-deep"), weight:6, opacity:.92},
  shortest:{color:getCSS("--blue"), weight:5, opacity:.75, dashArray:"7,9"},
  balanced:{color:"#F5A623", weight:5, opacity:.8}
};

function drawRoutes(data){
  routeGroup.clearLayers();
  const order = [...data.routes].sort((a,b)=>(a.recommended?1:0)-(b.recommended?1:0)); // recommended na wierzchu
  let bounds=null;
  order.forEach(rt=>{
    const st = ROUTE_STYLE[rt.profile] || {color:"#888",weight:5};
    const line = L.polyline(rt.geometry, st).addTo(routeGroup);
    bounds = bounds ? bounds.extend(line.getBounds()) : line.getBounds();
  });
  if(bounds) map.fitBounds(bounds, {padding:[40,40]});

  // panel wyników
  const wrap = document.getElementById("results");
  let html = "";
  if(!data.air_quality_available)
    html += '<div class="status show info" style="margin:0 0 10px">Brak danych Airly (limit API) — trasy liczone po dystansie. Po dodaniu kluczy pojawi się wariant „najzdrowszy".</div>';
  data.routes.forEach(rt=>{
    const s = rt.stats, st = ROUTE_STYLE[rt.profile]||{color:"#888"};
    html += `<div class="route-card ${rt.recommended?'rec':''}">
      <h3><span class="swatch" style="background:${st.color}"></span>${rt.label}
        ${rt.recommended?'<span class="badge">zalecana</span>':''}</h3>
      <div class="stats">
        <div class="stat"><div class="k">Dystans</div><div class="v">${s.distance_km}<small>km</small></div></div>
        <div class="stat"><div class="k">Czas</div><div class="v">${s.duration_min}<small>min</small></div></div>
        <div class="stat"><div class="k">Śr. AQI</div><div class="v" style="color:${aqiColor(s.avg_aqi)}">${s.avg_aqi ?? '—'}</div></div>
        <div class="stat"><div class="k">Maks. AQI</div><div class="v">${s.max_aqi ?? '—'}</div></div>
        <div class="stat"><div class="k">Kalorie</div><div class="v">${s.calories_kcal}<small>kcal</small></div></div>
        <div class="stat"><div class="k">PM2.5</div><div class="v">${s.avg_pm25 ?? '—'}<small>µg/m³</small></div></div>
      </div></div>`;
  });
  wrap.innerHTML = html;
  setStatus(null);
}

async function loadSensors(){
  sensorGroup.clearLayers();
  const info = document.getElementById("aqiInfo");
  info.textContent = "Ładowanie czujników…";
  try{
    const r = await fetch(API+"/api/sensors?area="+currentArea).then(r=>r.json());
    if(!r.sensors || !r.count){
      info.innerHTML = 'Brak danych z Airly (limit API wyczerpany). Mapa AQI pojawi się po dodaniu kluczy.';
      return;
    }
    r.sensors.forEach(s=>{
      if(s.lat==null||s.lng==null) return;
      L.circleMarker([s.lat,s.lng], {radius:8, color:"#fff", weight:1.5,
        fillColor:aqiColor(s.aqi), fillOpacity:.85}).addTo(sensorGroup)
        .bindPopup(`<b>${s.address||'Czujnik'}</b><br>AQI: ${s.aqi ?? '—'}<br>PM2.5: ${s.pm25 ?? '—'} µg/m³<br>PM10: ${s.pm10 ?? '—'} µg/m³`);
    });
    const ago = r.refreshed_ago!=null ? Math.round(r.refreshed_ago/60) : "?";
    info.innerHTML = `<b>${r.count}</b> czujników · odświeżono ${ago} min temu`;
  }catch(e){ info.textContent = "Nie udało się pobrać czujników."; }
}

init();
</script>
</body>
</html>
